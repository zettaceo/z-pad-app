<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Background radial glow -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1a3e"/>
      <stop offset="100%" stop-color="#040b1e"/>
    </radialGradient>

    <!-- Body gradient -->
    <linearGradient id="body-grad" x1="20" y1="30" x2="80" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a6e"/>
      <stop offset="100%" stop-color="#0d1f4a"/>
    </linearGradient>

    <!-- Cyan eye glow -->
    <radialGradient id="eye-l" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="60%" stop-color="#00b4d8"/>
      <stop offset="100%" stop-color="#0077b6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eye-r" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="60%" stop-color="#00b4d8"/>
      <stop offset="100%" stop-color="#0077b6" stop-opacity="0"/>
    </radialGradient>

    <!-- Visor gradient -->
    <linearGradient id="visor-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.12"/>
    </linearGradient>

    <!-- Core orb gradient -->
    <radialGradient id="orb-grad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </radialGradient>

    <!-- Neck/collar gradient -->
    <linearGradient id="collar-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2e5a"/>
      <stop offset="100%" stop-color="#0d1836"/>
    </linearGradient>

    <!-- Outer ring gradient -->
    <linearGradient id="ring-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>

    <!-- Glow filter for eyes -->
    <filter id="eye-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Soft outer glow -->
    <filter id="outer-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/>
    </filter>

    <!-- Clip for head -->
    <clipPath id="head-clip">
      <rect x="22" y="18" width="56" height="52" rx="12"/>
    </clipPath>
  </defs>

  <!-- Outer animated ring -->
  <circle cx="50" cy="50" r="47" stroke="url(#ring-grad)" stroke-width="1.2" stroke-dasharray="4 3" opacity="0.5"/>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="44" fill="url(#bg-glow)"/>

  <!-- Subtle hex grid pattern -->
  <g opacity="0.07" stroke="#00d4ff" stroke-width="0.4">
    <line x1="10" y1="50" x2="90" y2="50"/>
    <line x1="50" y1="10" x2="50" y2="90"/>
    <line x1="20" y1="22" x2="80" y2="78"/>
    <line x1="80" y1="22" x2="20" y2="78"/>
    <circle cx="50" cy="50" r="20" fill="none"/>
    <circle cx="50" cy="50" r="35" fill="none"/>
  </g>

  <!-- Shoulders / torso base -->
  <path d="M 18 90 Q 18 76 30 74 L 50 71 L 70 74 Q 82 76 82 90 Z" fill="url(#collar-grad)" opacity="0.9"/>
  <rect x="22" y="73" width="56" height="4" rx="2" fill="#1a3060" opacity="0.6"/>

  <!-- Neck -->
  <rect x="43" y="68" width="14" height="8" rx="3" fill="url(#collar-grad)"/>
  <!-- Neck detail lines -->
  <line x1="43" y1="71" x2="57" y2="71" stroke="#00d4ff" stroke-width="0.4" opacity="0.4"/>
  <line x1="43" y1="73" x2="57" y2="73" stroke="#00d4ff" stroke-width="0.4" opacity="0.4"/>

  <!-- Head base -->
  <rect x="22" y="18" width="56" height="52" rx="12" fill="url(#body-grad)" filter="url(#shadow)"/>

  <!-- Head top ridge / antenna details -->
  <rect x="38" y="14" width="24" height="6" rx="3" fill="#152444"/>
  <!-- Antenna left -->
  <line x1="35" y1="14" x2="32" y2="8" stroke="#00d4ff" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <circle cx="31" cy="7" r="2" fill="#00d4ff" opacity="0.9" filter="url(#eye-glow)"/>
  <!-- Antenna right -->
  <line x1="65" y1="14" x2="68" y2="8" stroke="#7c3aed" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <circle cx="69" cy="7" r="2" fill="#7c3aed" opacity="0.9" filter="url(#eye-glow)"/>

  <!-- Ear/side panel left -->
  <rect x="17" y="30" width="6" height="22" rx="3" fill="#112040"/>
  <rect x="18" y="34" width="4" height="4" rx="1" fill="#00d4ff" opacity="0.5"/>
  <rect x="18" y="41" width="4" height="4" rx="1" fill="#7c3aed" opacity="0.5"/>
  <!-- Ear/side panel right -->
  <rect x="77" y="30" width="6" height="22" rx="3" fill="#112040"/>
  <rect x="78" y="34" width="4" height="4" rx="1" fill="#00d4ff" opacity="0.5"/>
  <rect x="78" y="41" width="4" height="4" rx="1" fill="#7c3aed" opacity="0.5"/>

  <!-- Visor band (across eyes) -->
  <rect x="22" y="32" width="56" height="20" rx="4" fill="url(#visor-grad)" clip-path="url(#head-clip)"/>
  <!-- Visor reflection -->
  <rect x="24" y="33" width="52" height="3" rx="1.5" fill="white" opacity="0.05"/>

  <!-- Left eye -->
  <g filter="url(#eye-glow)">
    <circle cx="37" cy="42" r="7" fill="#051428"/>
    <circle cx="37" cy="42" r="5.5" fill="url(#eye-l)" opacity="0.9"/>
    <circle cx="37" cy="42" r="3" fill="#00e5ff"/>
    <circle cx="37" cy="42" r="1.5" fill="white" opacity="0.95"/>
    <!-- Eye ring -->
    <circle cx="37" cy="42" r="7" stroke="#00d4ff" stroke-width="0.8" fill="none" opacity="0.6"/>
    <!-- Highlight dot -->
    <circle cx="34.5" cy="39.5" r="1" fill="white" opacity="0.8"/>
  </g>

  <!-- Right eye -->
  <g filter="url(#eye-glow)">
    <circle cx="63" cy="42" r="7" fill="#051428"/>
    <circle cx="63" cy="42" r="5.5" fill="url(#eye-r)" opacity="0.9"/>
    <circle cx="63" cy="42" r="3" fill="#00e5ff"/>
    <circle cx="63" cy="42" r="1.5" fill="white" opacity="0.95"/>
    <circle cx="63" cy="42" r="7" stroke="#00d4ff" stroke-width="0.8" fill="none" opacity="0.6"/>
    <circle cx="60.5" cy="39.5" r="1" fill="white" opacity="0.8"/>
  </g>

  <!-- Brow / top edge above eyes -->
  <rect x="28" y="32" width="16" height="2" rx="1" fill="#00d4ff" opacity="0.3"/>
  <rect x="56" y="32" width="16" height="2" rx="1" fill="#00d4ff" opacity="0.3"/>

  <!-- Nose / sensor dot -->
  <circle cx="50" cy="51" r="1.5" fill="#00d4ff" opacity="0.6"/>

  <!-- Mouth / speaker grille -->
  <g opacity="0.85">
    <!-- Outer mouth frame -->
    <rect x="33" y="56" width="34" height="8" rx="4" fill="#0a1830"/>
    <rect x="33" y="56" width="34" height="8" rx="4" stroke="#1e3a6e" stroke-width="0.8"/>
    <!-- Speaker bars -->
    <rect x="36" y="58.5" width="3" height="3" rx="0.8" fill="#00d4ff" opacity="0.7"/>
    <rect x="41" y="58.5" width="3" height="3" rx="0.8" fill="#00d4ff" opacity="0.5"/>
    <rect x="46" y="58.5" width="3" height="3" rx="0.8" fill="#00d4ff" opacity="0.9"/>
    <rect x="51" y="58.5" width="3" height="3" rx="0.8" fill="#00d4ff" opacity="0.5"/>
    <rect x="56" y="58.5" width="3" height="3" rx="0.8" fill="#00d4ff" opacity="0.7"/>
    <rect x="61" y="58.5" width="3" height="3" rx="0.8" fill="#00d4ff" opacity="0.4"/>
  </g>

  <!-- Forehead circuit lines -->
  <g stroke="#00d4ff" stroke-width="0.5" opacity="0.25" stroke-linecap="round">
    <line x1="30" y1="26" x2="38" y2="26"/>
    <line x1="38" y1="26" x2="38" y2="29"/>
    <line x1="62" y1="26" x2="70" y2="26"/>
    <line x1="62" y1="26" x2="62" y2="29"/>
    <line x1="44" y1="22" x2="56" y2="22"/>
    <circle cx="38" cy="29" r="1" fill="#00d4ff" opacity="0.4"/>
    <circle cx="62" cy="29" r="1" fill="#00d4ff" opacity="0.4"/>
  </g>

  <!-- Chest/torso - AI core orb -->
  <circle cx="50" cy="81" r="5" fill="#0a1530" stroke="#1a3060" stroke-width="0.8"/>
  <circle cx="50" cy="81" r="3.5" fill="url(#orb-grad)" opacity="0.9" filter="url(#eye-glow)"/>
  <circle cx="50" cy="81" r="1.5" fill="white" opacity="0.7"/>

  <!-- Shoulder accent lines -->
  <line x1="25" y1="77" x2="35" y2="75" stroke="#00d4ff" stroke-width="0.6" opacity="0.4" stroke-linecap="round"/>
  <line x1="75" y1="77" x2="65" y2="75" stroke="#00d4ff" stroke-width="0.6" opacity="0.4" stroke-linecap="round"/>
</svg>
