<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020e1a"/>
      <stop offset="100%" stop-color="#010810"/>
    </linearGradient>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="44" fill="url(#bg)"/>
  <!-- Stacked coin layers (top to bottom, different heights) -->
  <!-- Coin 1 (bottom) -->
  <ellipse cx="100" cy="138" rx="46" ry="12" fill="#0369a1" opacity="0.8"/>
  <rect x="54" y="118" width="92" height="20" fill="#0369a1" opacity="0.8"/>
  <ellipse cx="100" cy="118" rx="46" ry="12" fill="#0ea5e9" opacity="0.9"/>
  <!-- Coin 2 (middle) -->
  <ellipse cx="100" cy="112" rx="40" ry="10" fill="#075985"/>
  <rect x="60" y="95" width="80" height="17" fill="#075985"/>
  <ellipse cx="100" cy="95" rx="40" ry="10" fill="#38bdf8" opacity="0.95"/>
  <!-- Coin 3 (top) -->
  <ellipse cx="100" cy="88" rx="34" ry="9" fill="#0c4a6e"/>
  <rect x="66" y="73" width="68" height="15" fill="#0c4a6e"/>
  <ellipse cx="100" cy="73" rx="34" ry="9" fill="#7dd3fc"/>
  <!-- B letter on top coin -->
  <text x="100" y="78" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="#0c4a6e" text-anchor="middle">B</text>
  <!-- Upward arrow -->
  <path d="M 100 55 L 88 42 M 100 55 L 112 42 M 100 55 L 100 35" stroke="url(#g)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Label -->
  <text x="100" y="172" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" fill="#38bdf8" text-anchor="middle" opacity="0.9">BASELEND</text>
</svg>
