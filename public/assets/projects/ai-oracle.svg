  <!-- Circuit nodes -->
  <circle cx="44" cy="100" r="4" fill="#a855f7" opacity="0.9"/>
  <circle cx="156" cy="100" r="4" fill="#00d4ff" opacity="0.9"/>
  <!-- Scan lines -->
  <line x1="58" y1="68" x2="68" y2="78" stroke="url(#g)" stroke-width="2.5" opacity="0.5"/>
  <line x1="142" y1="68" x2="132" y2="78" stroke="url(#g)" stroke-width="2.5" opacity="0.5"/>
  <line x1="58" y1="132" x2="68" y2="122" stroke="url(#g)" stroke-width="2.5" opacity="0.5"/>
  <line x1="142" y1="132" x2="132" y2="122" stroke="url(#g)" stroke-width="2.5" opacity="0.5"/>
  <!-- AI text -->
  <text x="100" y="172" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="url(#g)" text-anchor="middle" opacity="0.9">ORACLE</text>
