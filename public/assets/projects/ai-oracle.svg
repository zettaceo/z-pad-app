<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0621"/>
      <stop offset="100%" stop-color="#1a0a38"/>
    </linearGradient>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="44" fill="url(#bg)"/>
  <!-- Eye outline -->
  <path d="M 30 100 Q 100 45 170 100 Q 100 155 30 100 Z" fill="none" stroke="url(#g)" stroke-width="7" stroke-linejoin="round"/>
  <!-- Iris -->
