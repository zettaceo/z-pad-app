<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090217"/>
      <stop offset="100%" stop-color="#05010f"/>
    </linearGradient>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="44" fill="url(#bg)"/>
  <!-- Atom nucleus -->
  <circle cx="100" cy="95" r="12" fill="url(#g)"/>
  <!-- Orbit 1 (horizontal ellipse) -->
  <ellipse cx="100" cy="95" rx="58" ry="22" fill="none" stroke="url(#g)" stroke-width="4" opacity="0.9"/>
  <!-- Orbit 2 (tilted 60°) -->
  <ellipse cx="100" cy="95" rx="58" ry="22" fill="none" stroke="url(#g)" stroke-width="4" opacity="0.7" transform="rotate(60 100 95)"/>
  <!-- Orbit 3 (tilted 120°) -->
  <ellipse cx="100" cy="95" rx="58" ry="22" fill="none" stroke="url(#g)" stroke-width="4" opacity="0.5" transform="rotate(120 100 95)"/>
  <!-- Electron dots -->
  <circle cx="158" cy="95" r="6" fill="#c084fc"/>
  <circle cx="71" cy="49" r="6" fill="#818cf8"/>
  <circle cx="71" cy="141" r="6" fill="#00d4ff"/>
  <!-- Label -->
  <text x="100" y="172" font-family="Arial Black, sans-serif" font-size="17" font-weight="900" fill="url(#g)" text-anchor="middle" opacity="0.9">QDEX</text>
</svg>
