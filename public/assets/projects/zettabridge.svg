<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060c2a"/>
      <stop offset="100%" stop-color="#030818"/>
    </linearGradient>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="44" fill="url(#bg)"/>
  <!-- Bridge road -->
  <rect x="30" y="108" width="140" height="12" rx="6" fill="url(#g)" opacity="0.3"/>
  <!-- Bridge arc -->
  <path d="M 38 120 Q 100 42 162 120" fill="none" stroke="url(#g)" stroke-width="7" stroke-linecap="round"/>
  <!-- Suspenders -->
  <line x1="62" y1="82" x2="62" y2="120" stroke="url(#g)" stroke-width="3" opacity="0.7"/>
  <line x1="84" y1="62" x2="84" y2="120" stroke="url(#g)" stroke-width="3" opacity="0.7"/>
  <line x1="100" y1="53" x2="100" y2="120" stroke="url(#g)" stroke-width="3" opacity="0.7"/>
  <line x1="116" y1="62" x2="116" y2="120" stroke="url(#g)" stroke-width="3" opacity="0.7"/>
  <line x1="138" y1="82" x2="138" y2="120" stroke="url(#g)" stroke-width="3" opacity="0.7"/>
  <!-- Nodes at ends -->
  <circle cx="38" cy="120" r="9" fill="url(#g)"/>
  <circle cx="162" cy="120" r="9" fill="url(#g)"/>
  <!-- Chain identifier -->
  <circle cx="38" cy="120" r="4" fill="#030818"/>
  <circle cx="162" cy="120" r="4" fill="#030818"/>
  <!-- Label -->
  <text x="100" y="158" font-family="Arial Black, sans-serif" font-size="14" font-weight="900" fill="url(#g)" text-anchor="middle" opacity="0.9">ZETTABRIDGE</text>
  <!-- Bi-directional arrows -->
  <path d="M 54 138 L 44 132 L 54 126" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 146 138 L 156 132 L 146 126" fill="none" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
